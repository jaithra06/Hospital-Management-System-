<div class="login-wrapper">
  <div class="login-card">
    <h1>CareNest Login</h1>
    <p class="subtitle">Welcome back 👋</p>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email"
    />

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
    />

    <button class="login-btn" (click)="login()">
      Login
    </button>

    <p class="text error" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

    <p class="text">
      Not registered?
      <a class="link" routerLink="/register">Sign up</a>
    </p>
  </div>
</div>
