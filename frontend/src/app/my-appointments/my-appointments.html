<div class="dashboard-container">

  <!-- Top Header -->
  <header class="topbar">
    <h2>My Appointments</h2>
    <button class="logout-btn" (click)="logout()">Logout</button>
  </header>

  <!-- Body -->
  <div class="dashboard-body">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Patient Panel</h3>

      <button class="menu-item" routerLink="/patient-dashboard">
        📊 Dashboard
      </button>

      <button class="menu-item" routerLink="/book-appointment">
        📅 Book Appointment
      </button>

      <button class="menu-item active" routerLink="/my-appointments">
        📁 My Appointments
      </button>

      <button class="menu-item" routerLink="/profile">
        👤 Profile
      </button>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <div class="table-card">

        <h3 class="title">My Appointments</h3>

        <!-- Loading -->
      

        <!-- Error -->
        <p *ngIf="error" class="error-text">{{ error }}</p>

        <!-- Table -->
        <table *ngIf="!loading && appointments && appointments.length > 0">
          <thead>
            <tr>
              <th>Doctor</th>
              <th>Specialization</th>
              <th>Date & Time</th>
              <th>Status</th>
              <th>Problem</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let a of appointments">
              <td>{{ a.doctorName || a.doctor }}</td>
              <td>{{ a.specialization }}</td>
              <td>{{ a.appointmentDate | date:'d/M/yyyy, h:mm a' }}</td>
              <td>
                <span class="status" [ngClass]="a.status?.toLowerCase()">
                  {{ a.status }}
                </span>
              </td>
              <td>{{ a.problemDescription || a.problem }}</td>
            </tr>
          </tbody>
        </table>

        <!-- No Data -->
        <p *ngIf="!loading && appointments.length === 0" class="empty-text">
          No appointments booked yet
        </p>

      </div>
    </main>

  </div>
</div>
